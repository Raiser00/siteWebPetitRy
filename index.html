---
layout: layout.njk
title: Accueil
---

<header class="relative h-[60vh] flex items-center justify-center text-white overflow-hidden">
    <div id="carousel" class="absolute inset-0 w-full h-full">
        <img src="/assets/img/eglise.jpg" 
             alt="L'Église du Petit-Ry" 
             class="carousel-item absolute inset-0 w-full h-full object-cover brightness-[0.4] opacity-100 transition-opacity duration-1000 ease-in-out">
        
        <img src="/assets/img/grand-feu.jpg" 
             alt="Le Grand Feu traditionnel" 
             class="carousel-item absolute inset-0 w-full h-full object-cover brightness-[0.4] opacity-0 transition-opacity duration-1000 ease-in-out">
        
        <img src="/assets/img/residence_petit-ry.jpg" 
             alt="Residence calme du quartier" 
             class="carousel-item absolute inset-0 w-full h-full object-cover brightness-[0.4] opacity-0 transition-opacity duration-1000 ease-in-out">
    </div>

    <div class="relative text-center px-4 z-10">
        <h1 class="text-5xl md:text-3xl font-extrabold mb-4 tracking-tighter uppercase">Petit-Ry 1340</h1>
        <p class="text-xl md:text-2xl max-w-2xl mx-auto italic opacity-90 font-light border-t-2 border-green-500 pt-4 inline-block">Un quartier d'Ottignies où il fait bon vivre.</p>
    </div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex space-x-2 z-10">
        <span class="carousel-dot w-3 h-3 rounded-full bg-white opacity-100 transition-opacity"></span>
        <span class="carousel-dot w-3 h-3 rounded-full bg-white opacity-50 transition-opacity"></span>
        <span class="carousel-dot w-3 h-3 rounded-full bg-white opacity-50 transition-opacity"></span>
    </div>
</header>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const slides = document.querySelectorAll('.carousel-item');
        const dots = document.querySelectorAll('.carousel-dot');
        let currentSlide = 0;
        const slideInterval = 5000; // 5 secondes entre chaque image

        function nextSlide() {
            // 1. Cacher la slide actuelle
            slides[currentSlide].classList.remove('opacity-100');
            slides[currentSlide].classList.add('opacity-0');
            dots[currentSlide].classList.remove('opacity-100');
            dots[currentSlide].classList.add('opacity-50');

            // 2. Calculer l'index de la slide suivante (boucle)
            currentSlide = (currentSlide + 1) % slides.length;

            // 3. Afficher la nouvelle slide
            slides[currentSlide].classList.remove('opacity-0');
            slides[currentSlide].classList.add('opacity-100');
            dots[currentSlide].classList.remove('opacity-100');
            dots[currentSlide].classList.add('opacity-50'); // Juste pour l'effet de fade
            dots[currentSlide].classList.add('opacity-100'); // S'assure qu'elle est visible
        }

        // Lancer le défilement automatique
        setInterval(nextSlide, slideInterval);
    });
</script>

<section class="py-10 container mx-auto px-4">
    <h2 class="text-3xl font-bold mb-6">Quoi de neuf à Petit-Ry ?</h2>

    <div class="grid md:grid-cols-2 gap-6">
        {% for post in collections.actu %}
        <article class="p-6 bg-white border border-gray-200 rounded-lg shadow-sm">
            <h3 class="text-xl font-bold text-green-700">
    <a href="{{ post.url }}" class="hover:underline">{{ post.data.title }}</a>
</h3>
<p class="text-sm text-gray-500 mb-4">Publié le {{ post.date | formatDate }}</p>            <div class="text-gray-600">
                {{ post.content }}
            </div>
        </article>
        {% endfor %}
    </div>
</section>
