backend:
  name: git-gateway
  branch: main 

media_folder: "assets/img" # Où seront stockées les photos uploadées
public_folder: "/assets/img"


collections:
  - name: "blog"
    label: "Actualités"
    folder: "actus" # Le dossier où sont tes fichiers .md d'actu
    media_folder: "assets/img"
    public_folder: "/assets/img"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Corps du texte", name: "body", widget: "markdown" }
  
  - name: "gazette"
    label: "La Gazette (PDF)"
    folder: "gazette" # Le dossier où seront stockés les PDF de la gazette
    media_folder: "assets/gazette"
    public_folder: "/assets/gazette"
    create: true
    slug: "gazette-{{year}}-{{month}}"
    extension: "md" # Le CMS crée un petit fichier texte pour chaque PDF
    format: "frontmatter"
    fields:
      - { label: "Tag", name: "tags", widget: "hidden", default: "gazette" }
      - { label: "Titre de l'édition", name: "title", widget: "string", placeholder: "Ex: Gazette n°34 - Avril 2024" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Le fichier PDF", name: "file", widget: "file", allow_multiple: false, choose_url: false }
      - { label: "Image de couverture", name: "thumbnail", widget: "image", required: false }

  - name: "VIP"
    label: "VIP du quartier"
    folder: "vip" # Le dossier où seront stockés les fichiers .md de VIP
    media_folder: "assets/vip"
    public_folder: "/assets/vip"
    create: true
    slug: "vip-{{name}}"
    fields:
      - { label: "Nom de la personne", name: "title", widget: "string" }
      - { label: "Période (ex: Mai 2026)", name: "periode", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Texte / Interview", name: "body", widget: "markdown" }
      - { label: "Tag", name: "tags", widget: "hidden", default: "vip" }