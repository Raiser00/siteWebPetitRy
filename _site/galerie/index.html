<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galerie Photos | Petit-Ry</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <nav class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
        <a href="/" class="text-2xl font-bold tracking-tight">Petit-Ry</a>
        <ul class="flex flex-wrap justify-center gap-2 md:gap-6">
            <li><a href="/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Accueil</a></li>
            <li><a href="/agenda/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Agenda</a></li>
            <li><a href="/infos-pratiques/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Infos Pratiques</a></li>
            <li><a href="/annonces/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Le coin annonces</a></li>
            <li><a href="/contact/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Contact</a></li>
            <li><a href="/galerie/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition">Galerie</a></li>
            <li><a href="/histoire/" class="block px-4 py-3 md:py-1 hover:text-green-200 transition border border-white/30 rounded-lg">L'histoire du Petit-Ry</a></li>
            </ul>
    </div>
</nav>
</head>
<body class="bg-stone-50 text-gray-800">
    <main>
      
<div class="container mx-auto px-4 py-12">
    <div class="text-center mb-16">
        <h1 class="text-4xl font-extrabold text-green-900 mb-4">Souvenirs du Petit-Ry</h1>
        <p class="text-gray-600 italic">Revivez les moments forts de notre quartier.</p>
    </div>

    <div class="flex justify-center gap-4 mb-12">
        <button onclick="filterAlbum('all')" class="px-6 py-2 rounded-full border-2 border-green-700 text-green-700 font-bold hover:bg-green-700 hover:text-white transition shadow-sm">Tous</button>
        <button onclick="filterAlbum('test')" class="px-6 py-2 rounded-full border-2 border-orange-500 text-orange-600 font-bold hover:bg-orange-500 hover:text-white transition shadow-sm">Album Test</button>
    </div>

    <section class="album-section test mb-16">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b-2 border-orange-500 inline-block">🔥 Album Test</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="group relative cursor-pointer overflow-hidden rounded-xl shadow-lg h-64 bg-gray-200" onclick="openLightbox(this)">
                <img src="/assets/img/album-test/image1.jpg" alt="Grand Feu" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all flex items-center justify-center">
                    <span class="text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity">+</span>
                </div>
            </div>

            <div class="group relative cursor-pointer overflow-hidden rounded-xl shadow-lg h-64 bg-gray-200" onclick="openLightbox(this)">
                <img src="/assets/img/album-test/image2.jpg" alt="Ambiance" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all flex items-center justify-center">
                    <span class="text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity">+</span>
                </div>
            </div>

            <div class="group relative cursor-pointer overflow-hidden rounded-xl shadow-lg h-64 bg-gray-200" onclick="openLightbox(this)">
                <img src="/assets/img/album-test/image3.jpg" alt="Afficher le nom de la photo" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all flex items-center justify-center">
                    <span class="text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity">+</span>
                </div>
            </div>

            <div class="group relative cursor-pointer overflow-hidden rounded-xl shadow-lg h-64 bg-gray-200" onclick="openLightbox(this)">
                <img src="/assets/img/album-test/image4.jpg" alt="Feu de joie" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all flex items-center justify-center">
                    <span class="text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity">+</span>
                </div>
            </div>

            <div class="group relative cursor-pointer overflow-hidden rounded-xl shadow-lg h-64 bg-gray-200" onclick="openLightbox(this)">
                <img src="/assets/img/album-test/image5.jpg" alt="Feu de pas joie" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all flex items-center justify-center">
                    <span class="text-white text-4xl opacity-0 group-hover:opacity-100 transition-opacity">+</span>
                </div>
            </div>

        </div>
    </section>
</div>

<div id="lightbox" class="fixed inset-0 bg-black bg-opacity-95 z-[100] hidden flex-col items-center justify-center p-4 backdrop-blur-sm" onclick="closeLightbox()">
    <button class="absolute top-6 right-8 text-white text-5xl font-light hover:text-orange-500 transition">&times;</button>
    
    <img id="lightbox-img" src="" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl border-2 border-white/20" onclick="event.stopPropagation()">
    
    <p id="lightbox-caption" class="text-white mt-6 text-2xl font-medium tracking-wide italic"></p>
</div>

<script>
    // 1. Filtrer les albums
    function filterAlbum(slug) {
        const sections = document.querySelectorAll('.album-section');
        sections.forEach(section => {
            if (slug === 'all' || section.classList.contains(slug)) {
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        });
    }

    // 2. Ouvrir la Lightbox
    function openLightbox(el) {
        const img = el.querySelector('img');
        const modal = document.getElementById('lightbox');
        const modalImg = document.getElementById('lightbox-img');
        const modalCaption = document.getElementById('lightbox-caption');

        modalImg.src = img.src;
        modalCaption.innerText = img.alt;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden'; // Empêche de scroller derrière
    }

    // 3. Fermer la Lightbox
    function closeLightbox() {
        const modal = document.getElementById('lightbox');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = 'auto'; // Réactive le scroll
    }
</script>
    </main>

    <footer class="bg-gray-900 text-white py-12">
        <div class="container mx-auto px-4 text-center">
            <h3 class="text-xl font-bold mb-4 text-green-400">Petit-Ry 1340</h3>
            <p class="text-gray-400 text-sm mb-6">Le site des villageois de Petit-Ry.</p>
            <div class="border-t border-gray-800 pt-6 text-gray-500 text-xs">
                &copy; 2026 - Comité de Quartier.
            </div>
        </div>
    </footer>

    </body>
</html>
